{{ define "main" }}
<section class="list-page">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <div class="post-grid">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="post-card">
        <h2>{{ .Title }}</h2>
        <p>{{ with .Description }}{{ . }}{{ end }}</p>
        <span class="read-more">Read article →</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
