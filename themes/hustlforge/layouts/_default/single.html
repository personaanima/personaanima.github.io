{{ define "main" }}
<article class="post">
  <div class="container">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <p class="post-meta">{{ .Date.Format "January 2, 2006" }} · {{ .ReadingTime }} min read</p>
    </header>
    <div class="post-content">{{ .Content }}</div>
  </div>
</article>
{{ end }}
